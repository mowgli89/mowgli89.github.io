<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520" role="img" aria-label="Symbolic line illustration of a curled fetus with glowing lungs">
  <defs>
    <radialGradient id="amnio" cx="50%" cy="46%" r="60%">
      <stop offset="0" stop-color="#21344d" stop-opacity="0.8"/>
      <stop offset="0.62" stop-color="#13243a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0b1826" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralglow" cx="50%" cy="56%" r="55%">
      <stop offset="0" stop-color="#ef7459" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ef7459" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ln" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#bcd9f5"/><stop offset="0.55" stop-color="#7fb0dc"/><stop offset="1" stop-color="#a6c290"/>
    </linearGradient>
    <radialGradient id="lungglow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a9d6ff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#7fb0dc" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#7fb0dc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="air" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c7e4ff"/><stop offset="0.6" stop-color="#7fb0dc"/><stop offset="1" stop-color="#a6c290"/>
    </linearGradient>
  </defs>

  <circle cx="260" cy="252" r="252" fill="url(#amnio)"/>
  <circle cx="250" cy="306" r="168" fill="url(#coralglow)"/>
  <circle cx="260" cy="256" r="198" fill="none" stroke="#2a3e58" stroke-width="1.3" opacity="0.45"/>

  <!-- CURLED FETUS as a continuous line, facing left -->
  <g fill="none" stroke="url(#ln)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- head + back + rump + tucked legs, one flowing contour -->
    <path d="M214 168
             C206 138 226 112 256 112
             C300 112 330 150 330 196
             C330 224 352 236 366 276
             C382 320 366 368 322 388
             C284 404 244 400 218 378
             C198 360 196 338 210 324
             C224 310 246 312 258 300
             C242 292 230 276 228 256"/>
    <!-- chin / jaw tuck back toward head (completes the face side) -->
    <path d="M228 256 C220 240 214 212 214 168"/>
    <!-- knee/leg accent line -->
    <path d="M214 350 C236 340 262 342 280 354" stroke-width="4" opacity="0.85"/>
    <!-- arm hint across chest -->
    <path d="M236 248 C248 262 250 280 244 296" stroke-width="3.6" opacity="0.7"/>
  </g>

  <!-- glowing lungs within the chest -->
  <circle cx="250" cy="286" r="74" fill="url(#lungglow)"/>
  <g>
    <g fill="none" stroke="url(#air)" stroke-linecap="round">
      <path d="M250 244 V266" stroke-width="5"/>
      <path d="M250 266 C248 282 230 284 226 304" stroke-width="3.8"/>
      <path d="M250 266 C252 282 270 284 274 304" stroke-width="3.8"/>
      <path d="M226 304 C221 316 219 326 216 336" stroke-width="2.4"/>
      <path d="M274 304 C279 316 281 326 284 336" stroke-width="2.4"/>
      <path d="M234 290 C227 298 225 310 226 320" stroke-width="2"/>
      <path d="M266 290 C273 298 275 310 274 320" stroke-width="2"/>
    </g>
    <g fill="#cfe6c4">
      <circle cx="216" cy="336" r="2.8"/><circle cx="284" cy="336" r="2.8"/>
      <circle cx="226" cy="320" r="2.1"/><circle cx="274" cy="320" r="2.1"/>
    </g>
  </g>
</svg>
